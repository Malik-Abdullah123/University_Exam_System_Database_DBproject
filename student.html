<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>Student Registration</h1>

<form action="/add_student" method="POST">

<input type="number" name="id" placeholder="Person ID" required>
<input type="text" name="name" placeholder="Name" required>
<input type="date" name="dob" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="phone" placeholder="Phone" required>
<input type="text" name="city" placeholder="City" required>
<input type="text" name="zip_code" placeholder="Zip Code" required>
<input type="text" name="street" placeholder="Street" required>

<input type="number" name="s_ssn" placeholder="Student SSN" required>
<input type="text" name="program" placeholder="Program" required>
<input type="text" name="cgpa" placeholder="CGPA" required>

<button type="submit">Add Student</button>

</form>

</div>

</body>
</html>
